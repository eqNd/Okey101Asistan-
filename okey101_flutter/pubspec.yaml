name: okey_101_assistant
description: Okey 101 Asistanı - Offline akıllı Okey yardımcısı
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Kamera & Görüntü İşleme
  camera: ^0.11.0
  image_picker: ^1.1.2
  tflite_flutter: ^0.10.4

  # Yerel Depolama
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Reklam
  google_mobile_ads: ^5.1.0

  # In-App Purchase
  in_app_purchase: ^3.1.13

  # UI & Animasyon
  lottie: ^3.1.0
  animated_flip_counter: ^0.3.2
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
